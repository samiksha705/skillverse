<!DOCTYPE html>
<html>

<head>

<title>Interview Practice</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

textarea{
width:60%;
height:120px;
margin-top:20px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Soft Skills Interview Practice</h1>

<h2 id="question"></h2>

<textarea id="answer" placeholder="Type your answer here..."></textarea>

<br>

<button onclick="nextQuestion()">Submit & Next Question</button>

<script>

let current = 0

const questions = [

"Tell me about a time when you worked in a team",

"How do you handle conflicts with coworkers?",

"Describe a situation where you showed leadership",

"How do you manage your time when facing multiple deadlines?",

"How do you stay motivated during difficult tasks?",

"What does good communication mean to you?",

"Describe a challenge you solved with teamwork"

]

function loadQuestion(){

document.getElementById("question").innerText =
questions[current]

}

function nextQuestion(){

let ans = document.getElementById("answer").value

console.log("User answer:",ans)

document.getElementById("answer").value=""

current++

if(current < questions.length){

loadQuestion()

}else{

document.getElementById("question").innerText =
"Interview Practice Completed"

}

}

loadQuestion()

</script>

</body>

</html>
